services:
  web:
    build: .
    container_name: greenharvest_web
    ports:
      - "8080:80"
    environment:
      DB_DRIVER: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: greenharvest_farm
      DB_USER: greenharvest_user
      DB_PASS: greenharvest_pass
      ADMIN_USER: admin
      ADMIN_PASS: admin3017
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: greenharvest_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: greenharvest_farm
      POSTGRES_USER: greenharvest_user
      POSTGRES_PASSWORD: greenharvest_pass
    volumes:
      - greenharvest_pg_data:/var/lib/postgresql/data
      - ./database/greenharvest-postgres.sql:/docker-entrypoint-initdb.d/greenharvest-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenharvest_user -d greenharvest_farm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  greenharvest_pg_data:
