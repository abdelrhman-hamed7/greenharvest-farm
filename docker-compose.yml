services:
  web:
    build: .
    container_name: greenharvest_web
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: greenharvest_farm
      DB_USER: greenharvest_user
      DB_PASS: greenharvest_pass
      ADMIN_USER: admin
      ADMIN_PASS: admin3017
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: greenharvest_db
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: greenharvest_farm
      MYSQL_USER: greenharvest_user
      MYSQL_PASSWORD: greenharvest_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - greenharvest_db_data:/var/lib/mysql
      - ./database/greenharvest.sql:/docker-entrypoint-initdb.d/greenharvest.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  greenharvest_db_data:
